name: Promote staging to production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.2.0)"
        required: false

env:
  DATABASE_URL: "postgresql://user:password@localhost:5432/syncxml"
  DIRECT_URL: "postgresql://user:password@localhost:5432/syncxml"
  SESSION_SECRET: "ci-session-secret-ci-session-secret"
  SYNCXML_ENCRYPTION_KEY: "ci-encryption-key-ci-encryption-key-32"
  SYNCXML_ENABLE_PERSISTENT_STORAGE: "false"
  SYNCXML_LOCAL_DEMO: "true"
  SYNCXML_ADMIN_PASSWORD: "ci-admin-password"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"
  AUTH_URL: "http://localhost:3000"
  AUTH_TRUST_HOST: "true"

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Checkout production
        run: git checkout production

      - name: Merge staging
        run: git merge --no-ff origin/staging -m "chore: merge staging to production [ci-skip]"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Create tag
        if: github.event.inputs.version
        run: git tag -a "${{ github.event.inputs.version }}" -m "Release ${{ github.event.inputs.version }}"

      - name: Push production
        if: success()
        run: git push origin production

      - name: Push tag
        if: success() && github.event.inputs.version
        run: git push origin "${{ github.event.inputs.version }}"

      - name: Success
        if: success()
        run: |
          echo "✓ Successfully promoted staging to production"
          echo "Version: ${{ github.event.inputs.version }}"
          echo "Vercel will deploy automatically."

      - name: Notify failure
        if: failure()
        run: |
          echo "✗ Promotion failed"
          echo "Check logs above for details."
        continue-on-error: true
