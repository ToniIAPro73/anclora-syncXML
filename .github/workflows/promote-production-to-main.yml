name: Promote production to main

on:
  workflow_dispatch: {}

env:
  DATABASE_URL: "postgresql://user:password@localhost:5432/syncxml"
  DIRECT_URL: "postgresql://user:password@localhost:5432/syncxml"
  SESSION_SECRET: "ci-session-secret-ci-session-secret"
  SYNCXML_ENCRYPTION_KEY: "ci-encryption-key-ci-encryption-key-32"
  SYNCXML_ENABLE_PERSISTENT_STORAGE: "false"
  SYNCXML_LOCAL_DEMO: "true"
  SYNCXML_ADMIN_PASSWORD: "ci-admin-password"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"
  AUTH_URL: "http://localhost:3000"
  AUTH_TRUST_HOST: "true"

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout main
        run: git checkout main

      - name: Merge production
        run: |
          git merge --no-ff origin/production -m "chore: merge production to main [ci-skip]"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Push main
        if: success()
        run: git push origin main

      - name: Notify
        if: success()
        run: echo "✓ Successfully synchronized production to main"

      - name: Notify failure
        if: failure()
        run: |
          echo "✗ Production to main synchronization failed"
          echo "Merge may have conflicts. Resolve manually."
        continue-on-error: true
